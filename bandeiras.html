<meta charset="UTF-8">
<div align="center">
<canvas width="600" height="800"></canvas>

<script>
	var tela = document.querySelector('canvas');
	var pincel = tela.getContext('2d');
		
		function bandeiraBrasil(){
			//Função para desenhar a bandeira do Brasil.
			pincel.fillStyle='green';
			pincel.fillRect(0, 0, 600, 400);

			pincel.fillStyle='yellow';
			pincel.beginPath();
			pincel.moveTo(100,200);
			pincel.lineTo(300,350);
			pincel.lineTo(500,200);
			pincel.fill();

			pincel.fillStyle='yellow';
			pincel.beginPath();
			pincel.moveTo(100,200);
			pincel.lineTo(300,50);
			pincel.lineTo(500,200);
			pincel.fill();

			pincel.fillStyle='darkblue';
			pincel.beginPath();
			pincel.arc(300, 200, 80, 0, 2 * 3.14);
			pincel.fill();}

		function bandeiraFranca(){
			//Função para desenhar a bandeira da França.
			pincel.fillStyle = 'blue';
			pincel.fillRect(0, 0, 200, 400);

			pincel.fillStyle = 'white';
			pincel.fillRect(200, 0, 200, 400);

			pincel.fillStyle = 'red';
			pincel.fillRect(400, 0, 200, 400);}

		function limpaTela(){pincel.clearRect(0, 0, 600, 400)}

		var mostraBrasil = true; 
		/*
		Aqui é criada uma variável e designado um valor true a ela, para que seja possível alternar entre as bandeiras
		*/

		function desenhaBandeiras(){
			if (mostraBrasil){
					bandeiraBrasil();
					mostraBrasil = false;
				} else {
					bandeiraFranca();
					mostraBrasil = true;
				}
			}

		setInterval(desenhaBandeiras, 1000);
		//Aqui o comando setInterval faz com que a função "desenhaBandeira" seja chamada a cada 1 seg. 



</script> 
</div>
